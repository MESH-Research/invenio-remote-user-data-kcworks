name: CI
on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install TOML parsing dependencies
        run: |
          uv pip install --system tomli tomli-w
      - name: Setup dependencies for standalone installation
        run: |
          python scripts/use_nested_dependencies.py
      - name: Install dependencies
        run: |
          uv lock
          uv sync --all-extras
      - name: Run tests
        run: |
          bash ./run-tests.sh
