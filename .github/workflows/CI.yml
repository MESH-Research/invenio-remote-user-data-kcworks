name: CI
on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@a26af69 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Install TOML parsing dependencies
        run: |
          uv pip install --system tomli tomli-w
      - name: Setup dependencies for standalone installation
        run: |
          python scripts/use_nested_dependencies.py
      - name: Install dependencies
        run: |
          uv lock
          uv sync --all-extras
      - name: Run tests
        run: |
          bash ./run-tests.sh
